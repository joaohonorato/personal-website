spring.application.name=auth-server
server.port=${PORT:9000}

# Database — same PostgreSQL as api
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Auth server settings
app.client.frontend-secret=${CLIENT_FRONTEND_SECRET}
app.client.agent-secret=${CLIENT_AGENT_SECRET}
app.jwt.expiration-days=${JWT_EXPIRATION_DAYS:30}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}

